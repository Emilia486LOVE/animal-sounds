server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/animal_voiceprint?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&socketTimeout=30000&connectTimeout=10000
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 1GB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: animal-voiceprint-secret-key-2024-must-be-at-least-256-bits-long
  expiration: 86400000

file:
  upload-dir: ./uploads
  model-dir: ./models
  feature-dir: ./features
  result-dir: ./results

logging:
  level:
    com.example.animalvoiceprint: DEBUG
    org.hibernate.SQL: DEBUG
